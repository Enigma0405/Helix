version: "3.9"

# ============================================================
# Project Helix — Docker Compose
# EvidenceOps Platform | AMD Unicorn Hackathon
# ============================================================

services:

  # ----------------------------------------------------------
  # PostgreSQL + pgvector (vector similarity search)
  # ----------------------------------------------------------
  db:
    image: pgvector/pgvector:pg17
    container_name: helix_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-helix}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_in_production}
      POSTGRES_DB: ${POSTGRES_DB:-helixdb}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - helix_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-helix} -d ${POSTGRES_DB:-helixdb}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    # NOTE: No host ports exposed — db is internal only for security

  # ----------------------------------------------------------
  # Redis (task queue / caching / pub-sub)
  # ----------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: helix_redis
    restart: unless-stopped
    networks:
      - helix_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s

  # ----------------------------------------------------------
  # MinIO (S3-compatible object storage for evidence files)
  # ----------------------------------------------------------
  minio:
    image: quay.io/minio/minio:latest
    container_name: helix_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-change_me_in_production}
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # MinIO Console UI
    volumes:
      - minio_data:/data
    networks:
      - helix_net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ----------------------------------------------------------
  # Backend — FastAPI application
  # ----------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: helix_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # These override values from .env for container networking
      DATABASE_URL: "postgresql+psycopg://${POSTGRES_USER:-helix}:${POSTGRES_PASSWORD:-change_me_in_production}@db:5432/${POSTGRES_DB:-helixdb}"
      REDIS_URL: "redis://redis:6379/0"
      MINIO_ENDPOINT: "minio:9000"
      MINIO_ACCESS_KEY: "${MINIO_ROOT_USER:-minioadmin}"
      MINIO_SECRET_KEY: "${MINIO_ROOT_PASSWORD:-change_me_in_production}"
      MINIO_SECURE: "false"
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - helix_net
    healthcheck:
      # curl is installed in backend/Dockerfile for this purpose
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    # Backend is NOT exposed directly — only through nginx

  # ----------------------------------------------------------
  # Frontend — React SPA (served by nginx in container)
  # ----------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: helix_frontend
    restart: unless-stopped
    networks:
      - helix_net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/ > /dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ----------------------------------------------------------
  # Nginx — Reverse proxy (single entry point)
  # ----------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: helix_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    networks:
      - helix_net

# ============================================================
# Networks
# ============================================================
networks:
  helix_net:
    driver: bridge

# ============================================================
# Named Volumes (persist across container restarts)
# ============================================================
volumes:
  pgdata:
    name: helix_pgdata
  minio_data:
    name: helix_minio_data
