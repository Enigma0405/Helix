########################################################################
# Project Helix — Nginx Reverse Proxy Configuration
# Single entry point routing traffic to frontend (React SPA)
# and backend (FastAPI) services within the Docker network.
#
# ROUTING NOTE (important):
#   All FastAPI routers define their own /api/ prefix internally
#   (e.g., prefix="/api/auth", prefix="/api/evidence").
#   Therefore nginx must NOT strip /api/ — it must forward the full
#   path to the backend unchanged:
#       Client: GET /api/auth/login
#       → Nginx: proxy_pass http://backend:8000/api/auth/login   ✅
#
#   Using proxy_pass http://backend:8000/ (with trailing slash) would
#   strip /api/ and send /auth/login → FastAPI 404.               ❌
########################################################################

server {
    listen 80;
    server_name _;

    # Maximum upload size for evidence file ingestion (50 MB)
    client_max_body_size 50M;

    # ----------------------------------------------------------------
    # Gzip compression for text assets
    # ----------------------------------------------------------------
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               application/vnd.ms-fontobject application/x-font-ttf
               font/opentype image/svg+xml image/x-icon;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;

    # ----------------------------------------------------------------
    # Security headers
    # ----------------------------------------------------------------
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ----------------------------------------------------------------
    # React SPA — all non-/api/ routes
    # ----------------------------------------------------------------
    location / {
        proxy_pass http://frontend:80;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;

        # Handle React Router (client-side routing)
        proxy_intercept_errors on;
        error_page 404 = @frontend_fallback;
    }

    location @frontend_fallback {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
    }

    # ----------------------------------------------------------------
    # FastAPI Backend — full path forwarded (routers include /api/ prefix)
    # ----------------------------------------------------------------
    location /api/ {
        # Forward full path including /api/ — FastAPI routers are mounted with /api/ prefix
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;

        # Headers for proper request context
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Extended timeouts for long-running AI inference calls
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
        proxy_send_timeout 300s;

        # Disable buffering for streaming responses (SSE)
        proxy_buffering off;
        proxy_cache off;
    }

    # ----------------------------------------------------------------
    # WebSocket support for real-time updates (SSE / WS)
    # ----------------------------------------------------------------
    location /api/ws/ {
        proxy_pass http://backend:8000/api/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
    }

    # ----------------------------------------------------------------
    # Health check endpoint (nginx-level, no backend call)
    # ----------------------------------------------------------------
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
